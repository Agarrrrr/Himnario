  <title>32 Alzad Oh Puertas</title>
  <link href="edit.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div id="scrollControl">
    <label for="scrollSpeed">Velocidad del scroll:</label>
    <input type="range" id="scrollSpeed" min="0" max="150" value="0">
  </div>

  <div>
    <p>Alzad, oh puertas, vuestras cabezas,</p>
    <p>Y alzaos vosotras, puertas eternas,</p>
    <p>Y entrará el Rey de gloria.</p>
    <p>¿Quién es este Rey de gloria?</p>
    <p>Jehová el fuerte y valiente,</p>
    <p>Jehová el valiente en batalla.</p>
    <p>//Jehová de los ejército//</p>
    <p>//Él es el Rey de gloria//</p>
  </div>

  <script src="scrollControl.js"></script>
