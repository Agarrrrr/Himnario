<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>144 Después De La Tormenta</title>
  <link href="edit.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div id="scrollControl">
    <label for="scrollSpeed">Velocidad del scroll:</label>
    <input type="range" id="scrollSpeed" min="0" max="150" value="0">
  </div>

  <div>
    <p>Después de la tormenta,</p>
    <p>Viene la calma, viene la paz,</p>
    <p>Si a Cristo de rodillas tú se la pides, te la dará.</p>
    <p>No importa si legiones</p>
    <p>De las tinieblas te hagan sufrir,</p>
    <p>En el sagrado nombre de Jesucristo,</p>
    <p>Tendrán que huir.</p>
  </div>

  <script src="scrollControl.js"></script>
</body>
</html>
