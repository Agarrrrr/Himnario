<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>150 Dios Es Nuestro Amparo</title>
  <link href="edit.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div id="scrollControl">
    <label for="scrollSpeed">Velocidad del scroll:</label>
    <input type="range" id="scrollSpeed" min="0" max="150" value="0">
  </div>

  <div>
    <p>Dios es nuestro amparo y fortaleza,</p>
    <p>Nuestro pronto auxilio en las tribulaciones.</p>
    <p>Por tanto, no temeremos</p>
    <p>Aunque la tierra sea removida,</p>
    <p>Aunque se traspasen los montes</p>
    <p>Al corazón del mar,</p>
    <p>Bramarán, turbaránse sus aguas.</p>
  </div>

  <script src="scrollControl.js"></script>
</body>
</html>
